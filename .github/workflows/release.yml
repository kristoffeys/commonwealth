name: Release

# Publish the @cmnwlth/* packages to npm (#49) and create the GitHub Release (#159). Two ways in:
#  - push a `v*` tag (e.g. `v0.1.0`) → publishes the current versions, or
#  - run this workflow manually (workflow_dispatch).
# Versions are managed with Changesets: `pnpm changeset` to record a change, `pnpm
# changeset version` to bump, commit, then tag. `changeset publish` only publishes packages
# whose version isn't already on the registry, so re-runs are safe.
#
# Prerequisites (one-time, owner):
#  - Own the `@cmnwlth` npm scope (public org — free) and add an `NPM_TOKEN` repo secret
#    with publish rights (an automation/granular token).
#  - Provenance (`publishConfig.provenance`) requires a PUBLIC repo + the `id-token: write`
#    permission below; it activates once the repo is public (#18). On a private repo, publish
#    still works — npm just skips the attestation.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release for the tag
      id-token: write # npm provenance / OIDC
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      # Gate the release on a green build + tests before anything reaches the registry.
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      # `changeset publish` builds are done above; it publishes each @cmnwlth/* package
      # (workspace:* deps are rewritten to real versions) and skips already-published versions.
      - run: pnpm changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      # The everyday release path is a locally pushed tag (scripts/release.mjs --commit +
      # `git push --follow-tags`), which lands here — so the GitHub Release is created here
      # too (#159), with generated notes, AFTER the npm publish succeeded. Idempotent: a
      # release that already exists (a re-run, or the Version & Release workflow's own step)
      # is left alone. Skipped on a workflow_dispatch from a branch — no tag, no release.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists — skipping."
          else
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" --generate-notes --verify-tag
          fi
