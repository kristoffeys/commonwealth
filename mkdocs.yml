site_name: Commonwealth
site_description: A multiplayer, git-backed, agent-readable second brain for teams.
site_url: https://kristoffeys.github.io/commonwealth/
site_author: Kristof Feys

repo_url: https://github.com/kristoffeys/commonwealth
repo_name: kristoffeys/commonwealth
edit_uri: edit/main/docs/
copyright: Apache-2.0 licensed. Markdown is the source of truth.

docs_dir: docs

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.action.view

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kristoffeys/commonwealth
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/package/@cmnwlth/cli
